<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Fit Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        div {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            resize: vertical;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        #results {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Job Fit Analyzer</h1>

    <div>
        <label>Resume</label>
        <textarea id="resume" rows = "10" col= "50" placeholder="Paste your resume here..."></textarea>
    </div>

    <div>
        <label>Job Description</label>
        <textarea id="jobDescription" rows="10" cols="50" placeholder="Paste the job description here..."></textarea>
    </div>

    <button id="analyzeBtn">Analyze</button>

    <div id="results"></div>

<script>
    document.getElementById("analyzeBtn").addEventListener("click", async function() {
        const resume = document.getElementById("resume").value;
        const jobDescription = document.getElementById("jobDescription").value;

        const response = await fetch("http://127.0.0.1:8000/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `resume=${encodeURIComponent(resume)}&job_description=${encodeURIComponent(jobDescription)}`
        });

        const data = await response.json();

        document.getElementById("results").innerHTML = `
            <h2>Results</h2>
            <p><strong>Match Score:</strong> ${data.match_score}%</p>
            <p><strong>Missing Keywords:</strong> ${data.missing_keywords.join(", ")}</p>
        `;
    });
</script>
</body>
</html>
